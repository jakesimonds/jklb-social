<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim Your jklbie Award</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Slab-styled card */
    .slab {
      width: 100%;
      max-width: 500px;
      border: 2px solid #e91e63;
      border-radius: 8px;
      background: #16213e;
      box-shadow: 0 4px 24px rgba(233, 30, 99, 0.2);
      overflow: hidden;
    }

    .slab-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }

    .slab-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #00bcd4;
    }

    .slab-body {
      padding: 1.5rem;
    }

    .hidden { display: none !important; }

    /* States */
    .state-loading {
      text-align: center;
      color: #00bcd4;
      font-size: 0.95rem;
      padding: 2rem 0;
    }

    .state-error {
      text-align: center;
      padding: 2rem 0;
    }

    .state-error p {
      color: #e91e63;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .state-error a {
      color: #00bcd4;
      text-decoration: underline;
    }

    /* Nomination display */
    .nomination-label {
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    .nomination-text {
      color: #ffeb3b;
      font-size: 1.05rem;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    .nomination-text a {
      color: #ffeb3b;
      text-decoration: underline;
    }

    .nominated-post {
      background: #1a1a2e;
      border: 2px dashed rgba(255, 235, 59, 0.4);
      padding: 0.75rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
    }

    .nominated-post .post-label {
      color: #888;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .nominated-post a {
      color: #00bcd4;
      text-decoration: underline;
    }

    .nom-date {
      color: #666;
      font-size: 0.8rem;
      margin-bottom: 1.25rem;
    }

    /* Claim button */
    .claim-btn {
      display: block;
      width: 100%;
      background: #e91e63;
      color: #1a1a2e;
      border: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .claim-btn:hover {
      background: #ff4081;
    }

    .claim-btn:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }

    .claim-btn.needs-login {
      background: #1a1a2e;
      border: 2px solid #e91e63;
      color: #e91e63;
    }

    .claim-btn.needs-login:hover {
      background: #e91e63;
      color: #1a1a2e;
    }

    /* Success state */
    .success-view {
      text-align: center;
      padding: 1rem 0;
    }

    .success-badge {
      display: inline-block;
      background: #4caf50;
      color: #1a1a2e;
      font-size: 0.85rem;
      font-weight: bold;
      padding: 0.5rem 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .success-text {
      color: #ffeb3b;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    .success-text code {
      background: rgba(0, 188, 212, 0.2);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      font-size: 0.85rem;
    }

    .pdsls-link {
      color: #00bcd4;
      text-decoration: underline;
      font-weight: bold;
    }

    .pdsls-link:hover {
      color: #26c6da;
    }

    /* Auth bar (small, inside slab) */
    .auth-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
    }

    .auth-info .handle {
      color: #ffeb3b;
      font-weight: bold;
    }

    .auth-info .logout-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .auth-info .logout-btn:hover {
      background: rgba(233, 30, 99, 0.2);
      color: #e0e0e0;
    }

    /* Footer link */
    .slab-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.5rem 0.75rem;
      text-align: center;
    }

    .slab-footer a {
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      font-size: 0.75rem;
    }

    .slab-footer a:hover {
      color: #00bcd4;
    }
  </style>
</head>
<body>
  <div class="slab">
    <div class="slab-header">
      <h2>jklbie Award</h2>
      <div class="auth-info hidden" id="authBar">
        <span class="handle" id="authHandle"></span>
        <button class="logout-btn" id="logoutBtn" title="Sign Out">↩</button>
      </div>
    </div>

    <div class="slab-body">
      <!-- Loading state -->
      <div id="stateLoading" class="state-loading">
        Loading nomination...
      </div>

      <!-- Error state -->
      <div id="stateError" class="state-error hidden"></div>

      <!-- Nomination display + claim -->
      <div id="stateNomination" class="hidden">
        <div class="nomination-label">Best Thing I Saw</div>
        <p class="nomination-text" id="nominationText"></p>

        <div class="nominated-post">
          <div class="post-label">nominated post</div>
          <a id="postLink" href="#" target="_blank" rel="noopener">view on Bluesky</a>
        </div>

        <div class="nom-date" id="nomDate"></div>

        <button class="claim-btn" id="claimBtn">Claim Award</button>
      </div>

      <!-- Success state -->
      <div id="stateSuccess" class="success-view hidden"></div>
    </div>

    <div class="slab-footer">
      <a href="https://jklb.social">jklb.social</a>
    </div>
  </div>

  <script type="module" src="/src/claim/main.ts"></script>
</body>
</html>
